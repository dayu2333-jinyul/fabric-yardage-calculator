<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)" rx="16"/>
  <text x="300" y="55" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">Fabric Yardage Cheat Sheet</text>
  <text x="300" y="82" text-anchor="middle" fill="#a8d5ba" font-size="14">Quick reference — 54" fabric, includes 10% waste</text>

  <!-- Header row -->
  <rect x="30" y="105" width="540" height="36" rx="6" fill="#40916c" opacity="0.6"/>
  <text x="45" y="129" fill="#fff" font-size="14" font-weight="600">Project</text>
  <text x="300" y="129" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">54" Fabric</text>
  <text x="540" y="129" text-anchor="end" fill="#fff" font-size="14" font-weight="600">Notes</text>

  <!-- Row 1 -->
  <rect x="30" y="141" width="540" height="32" rx="4" fill="#d8f3dc" opacity="0.15"/>
  <text x="45" y="163" fill="#d8f3dc" font-size="13">Throw Pillow 18×18"</text>
  <text x="300" y="163" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">½ yard</text>
  <text x="540" y="163" text-anchor="end" fill="#b7e4c7" font-size="12">Front + back</text>
  <!-- Row 2 -->
  <rect x="30" y="173" width="540" height="32" rx="4" fill="none"/>
  <text x="45" y="195" fill="#d8f3dc" font-size="13">Euro Pillow 20×20"</text>
  <text x="300" y="195" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">⅔ yard</text>
  <text x="540" y="195" text-anchor="end" fill="#b7e4c7" font-size="12">2 per width</text>
  <!-- Row 3 -->
  <rect x="30" y="205" width="540" height="32" rx="4" fill="#d8f3dc" opacity="0.15"/>
  <text x="45" y="227" fill="#d8f3dc" font-size="13">Curtain Panel 84" drop</text>
  <text x="300" y="227" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">2½ yards</text>
  <text x="540" y="227" text-anchor="end" fill="#b7e4c7" font-size="12">Per panel</text>
  <!-- Row 4 -->
  <rect x="30" y="237" width="540" height="32" rx="4" fill="none"/>
  <text x="45" y="259" fill="#d8f3dc" font-size="13">Knee-Length Dress</text>
  <text x="300" y="259" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">2–2½ yards</text>
  <text x="540" y="259" text-anchor="end" fill="#b7e4c7" font-size="12">45" fabric</text>
  <!-- Row 5 -->
  <rect x="30" y="269" width="540" height="32" rx="4" fill="#d8f3dc" opacity="0.15"/>
  <text x="45" y="291" fill="#d8f3dc" font-size="13">Knee-Length Skirt</text>
  <text x="300" y="291" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">1 yard</text>
  <text x="540" y="291" text-anchor="end" fill="#b7e4c7" font-size="12">Straight cut</text>
  <!-- Row 6 -->
  <rect x="30" y="301" width="540" height="32" rx="4" fill="none"/>
  <text x="45" y="323" fill="#d8f3dc" font-size="13">Queen Quilt Top</text>
  <text x="300" y="323" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">6½ yards</text>
  <text x="540" y="323" text-anchor="end" fill="#b7e4c7" font-size="12">45" quilting cotton</text>
  <!-- Row 7 -->
  <rect x="30" y="333" width="540" height="32" rx="4" fill="#d8f3dc" opacity="0.15"/>
  <text x="45" y="355" fill="#d8f3dc" font-size="13">Tablecloth 48×72", 12" drop</text>
  <text x="300" y="355" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">3 yards</text>
  <text x="540" y="355" text-anchor="end" fill="#b7e4c7" font-size="12">60" fabric</text>
  <!-- Row 8 -->
  <rect x="30" y="365" width="540" height="32" rx="4" fill="none"/>
  <text x="45" y="387" fill="#d8f3dc" font-size="13">Sofa (3-seat)</text>
  <text x="300" y="387" text-anchor="middle" fill="#95d5b2" font-size="14" font-weight="600">14–16 yards</text>
  <text x="540" y="387" text-anchor="end" fill="#b7e4c7" font-size="12">54" upholstery</text>

  <!-- Formula section -->
  <rect x="30" y="420" width="540" height="130" rx="10" fill="#40916c" opacity="0.3"/>
  <text x="300" y="450" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">The Yardage Formula</text>
  <text x="45" y="478" fill="#d8f3dc" font-size="13">1. Cut size = project dimension + (seam allowance × 2)</text>
  <text x="45" y="498" fill="#d8f3dc" font-size="13">2. Pieces per width = fabric width ÷ piece width (floor)</text>
  <text x="45" y="518" fill="#d8f3dc" font-size="13">3. Rows = total pieces ÷ pieces per width (ceiling)</text>
  <text x="45" y="538" fill="#d8f3dc" font-size="13">4. Yards = (rows × cut length) ÷ 36 × (1 + waste%)</text>

  <!-- Width reference -->
  <rect x="30" y="570" width="540" height="100" rx="10" fill="#1b4332" opacity="0.5"/>
  <text x="300" y="598" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">Standard Fabric Widths</text>
  <text x="45" y="622" fill="#b7e4c7" font-size="12">36" — Quilting cotton</text>
  <text x="300" y="622" fill="#b7e4c7" font-size="12">45" — Lightweight / apparel</text>
  <text x="45" y="642" fill="#b7e4c7" font-size="12">54" — Home decor</text>
  <text x="300" y="642" fill="#b7e4c7" font-size="12">60" — Upholstery</text>
  <text x="45" y="662" fill="#b7e4c7" font-size="12">108" — Wide drapery</text>

  <!-- URL -->
  <text x="300" y="710" text-anchor="middle" fill="#52b788" font-size="14">yardage-calc.com</text>
  <text x="300" y="730" text-anchor="middle" fill="#52b788" font-size="11">Free real-time fabric yardage calculator</text>
</svg>
